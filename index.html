<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playing Cards</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <main id="playing-cards">
        <div class="card spade">
            <div class="left">A <span>♠</span></div>
            <div class="middle">
                <span>♠</span>
            </div>
            <div class="right">A<span>♠</span></div>
        </div>

        <div class="card heart">
            <div class="left">Q <span>♥</span></div>
            <div class="middle">
                <span>♥</span>
                <span>♥</span>
            </div>
            <div class="right">Q <span>♥</span></div>
        </div>

        <div class="card diamond">
            <div class="left">K <span>♦</span></div>
            <div class="middle">
                <span>♦</span>
                <span>♦</span>
                <span>♦</span>
            </div>
            <div class="right">K <span>♦</span></div>
        </div>
    </main>
</body>

</html>
